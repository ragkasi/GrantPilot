name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Backend: run pytest
  # ---------------------------------------------------------------------------
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install \
            fastapi "uvicorn[standard]" pydantic pydantic-settings python-multipart \
            httpx anthropic sqlalchemy alembic pymupdf fpdf2 \
            "python-jose[cryptography]" bcrypt email-validator \
            pytest pytest-asyncio

      - name: Run backend tests
        run: |
          cd backend
          PYTHONPATH=. python -m pytest tests/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Frontend: typecheck + production build
  # ---------------------------------------------------------------------------
  frontend-checks:
    name: Frontend Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Typecheck
        run: cd frontend && npm run typecheck

      - name: Production build
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ---------------------------------------------------------------------------
  # E2E tests (Playwright) — runs only on main branch or when manually triggered
  # Requires both servers to be running; set up here with dev mode.
  # ---------------------------------------------------------------------------
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    # Only run E2E on pushes to main, not on every PR (saves CI minutes)
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          pip install \
            fastapi "uvicorn[standard]" pydantic pydantic-settings python-multipart \
            httpx anthropic sqlalchemy alembic pymupdf fpdf2 \
            "python-jose[cryptography]" bcrypt email-validator

      - name: Start backend
        run: |
          cd backend
          PYTHONPATH=. python -m uvicorn app.main:app --port 8000 &
          echo "Backend PID: $!"
          # Wait for backend to be ready
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break
            sleep 2
          done
        env:
          JWT_SECRET: ci-test-secret-not-for-production

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend for production
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Start frontend
        run: |
          cd frontend
          npm run start &
          echo "Frontend PID: $!"
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/health && break
            sleep 2
          done

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: cd frontend && npx playwright test --reporter=list
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
